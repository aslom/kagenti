version: 1
filesystem_policy:
  read_write:
    - /sandbox
    - /tmp
    - /Users
network_policies:
  ibm_litellm:
    name: IBM LiteLLM
    endpoints:
      - host: ete-litellm.ai-models.vpc-int.res.ibm.com
        port: 443
        access: full
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/bin/curl
      - path: /usr/bin/node
      - path: /usr/local/bin/node
